<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- Gradient -->
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>

    <!-- Subtle glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#020617"/>

  <!-- Core ring -->
  <circle cx="32" cy="32" r="10"
          stroke="url(#grad)"
          stroke-width="2.5"
          fill="none"
          filter="url(#glow)"/>

  <!-- Connections -->
  <g stroke="url(#grad)" stroke-width="2" stroke-linecap="round" filter="url(#glow)">
    <line x1="32" y1="32" x2="16" y2="32"/>
    <line x1="32" y1="32" x2="48" y2="32"/>
    <line x1="32" y1="32" x2="24" y2="18"/>
    <line x1="32" y1="32" x2="40" y2="18"/>
    <line x1="32" y1="32" x2="24" y2="46"/>
    <line x1="32" y1="32" x2="40" y2="46"/>
  </g>

  <!-- Outer nodes -->
  <g fill="url(#grad)">
    <circle cx="16" cy="32" r="2.8"/>
    <circle cx="48" cy="32" r="2.8"/>
    <circle cx="24" cy="18" r="2.8"/>
    <circle cx="40" cy="18" r="2.8"/>
    <circle cx="24" cy="46" r="2.8"/>
    <circle cx="40" cy="46" r="2.8"/>
  </g>

  <!-- Core node -->
  <circle cx="32" cy="32" r="3.2" fill="url(#grad)"/>
</svg>